<!DOCTYPE html>

<html>

<head>
  <meta charset="utf-8">
  <title>Database</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" , user-scalable=no">
  <link rel="stylesheet" href="/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/popup.css">

</head>

<body>
  <input type="hidden" id="storeid" value="0" />
 
  <div class="container">
    <div class="row">
      <div class="col-sm-6">
        <h2>Users</h2>
      </div>
      <div class="col-xs-12">
        <button type="button" class="btn btn-primary" onclick="userOpenForm();">
          Add
        </button>
      </div>
    </div>

    <div class="row">
      <div class="col-sm-6">
        <table id="userTable" class="table table-bordered
              table-condensed table-striped">
          <thead>
            <tr>
              <th>Edit</th>
              <th>Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Delete</th>
            </tr>
          </thead>
        </table>
      </div>
    </div>

    <div class="form-popup" id="userForm">
      <div class="container">
        <div class="form-field">
          <label for="username">Name</label>
          <input type="text" id="username" class="form-control" autofocus/>
        </div>
        <div class="form-field">
          <label for="email">Email</label>
          <input type="text" id="email" class="form-control" />
        </div>
        <div class="form-field">
          <label for="phone">Phone</label>
          <input type="text" id="phone" class="form-control" />
        </div>
        <div class="form-field">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" />
        </div>
        <div class="row">
          <div class="col-xs-12">
            <button type="button" id="userUpdateButton" class="btn btn-primary" onclick="userUpdateClick();">
              Add
            </button>
            <button type="button" id="userCloseButton" class="btn btn-primary" onclick="userFormClear();">
              Back
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>


  <div class="container">
    <div class="row">
      <div class="col-sm-6">
        <h2>Venues</h2>
      </div>
      <div class="col-xs-12">
        <button type="button" class="btn btn-primary" onclick="venueOpenForm();">
          Add
        </button>
      </div>
    </div>

    <div class="row">
      <div class="col-sm-6">
        <table id="venueTable" class="table table-bordered
                    table-condensed table-striped">
          <thead>
            <tr>
              <th>Edit</th>
              <th>Address</th>
              <th>Contact</th>
              <th>Seats</th>
              <th>Active</th>
              <th>Delete</th>
            </tr>
          </thead>
        </table>
      </div>
    </div>

    <div class="form-popup" id="venueForm">
      <div class="container">
        <div class="form-field">
          <label for="address">Address</label>
          <input type="text" id="address" class="form-control" autofocus/>
        </div>
        <div class="form-field">
          <label for="contact">Name</label>
          <input type="text" id="cName" class="form-control" />
        </div>
        <div class="form-field">
            <label for="contact">Email</label>
            <input type="text" id="cEmail" class="form-control" />
        </div>
        <div class="form-field">
            <label for="contact">Phone</label>
            <input type="text" id="cPhone" class="form-control" />
          </div>
        <div class="form-field">
          <label for="seats">Seats</label>
          <input type="text" id="seats" class="form-control" />
        </div>
        <div class="form-field">
          <label for="active">Active</label>
          <input type="checkbox" id="activeBox" class="form-control" />
        </div>
        <div class="row">
          <div class="col-xs-12">
            <button type="button" id="venueUpdateButton" class="btn btn-primary" onclick="venueUpdateClick();">
              Add
            </button>
            <button type="button" id="venueCloseButton" class="btn btn-primary" onclick="venueFormClear();">
              Back
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="row">
      <div class="col-sm-6">
        <h2>Gigs</h2>
      </div>
      <div class="col-xs-12">
        <button type="button" class="btn btn-primary" onclick="gigOpenForm();">
          Add
        </button>
      </div>
    </div>

    <div class="row">
      <div class="col-sm-6">
        <table id="gigTable" class="table table-bordered
                    table-condensed table-striped">
          <thead>
            <tr>
              <th>Edit</th>
              <th>Number</th>
              <th>Title</th>
              <th>Performer</th>
              <th>Venue</th>
              <th>Tickets Left</th>
              <th>Delete</th>
            </tr>
          </thead>
        </table>
      </div>
    </div>

    <div class="form-popup" id="gigForm">
      <div class="container">
        <div class="form-field">
          <label for="address">No.</label>
          <input type="text" id="houseNo" class="form-control" autofocus/>
        </div>
        <div class="form-field">
          <label for="contact">Title</label>
          <input type="text" id="title" class="form-control" />
        </div>
        <div class="form-field">
            <label for="contact">Performer</label>
            <input type="text" id="performer" class="form-control" />
        </div>
        <div class="form-field">
            <label for="contact">Venue</label>
            <input type="text" id="vAddress" class="form-control" />
          </div>
        <div class="form-field">
          <label for="seats">Seats</label>
          <input type="text" id="sSeats" class="form-control" />
        </div>
        <div class="form-field">
          <label for="seats">Sold</label>
          <input type="text" id="sold" class="form-control" />
        </div>
        <div class="row">
          <div class="col-xs-12">
            <button type="button" id="gigUpdateButton" class="btn btn-primary" onclick="gigUpdateClick();">
              Add
            </button>
            <button type="button" id="gigCloseButton" class="btn btn-primary" onclick="gigFormClear();">
              Back
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/libs/jquery-3.3.1.js"></script>

  <script src="/js/libs/bootstrap.min.js"></script>

  <script src="/js/libs/moment.js"></script>

  <script src="/js/libs/mustache.js"></script>

  <script src="/js/libs/deparam.js"></script>

  <script src="/js/database.js"></script>





</body>

</html>

<p></p>
